<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900"/>
      <stop offset="100%" style="stop-color:#e07b00"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg)" stroke="#ff9900" stroke-width="2"/>
  <rect x="10" y="10" width="180" height="180" rx="14" fill="none" stroke="rgba(255,153,0,0.3)" stroke-width="1"/>
  <!-- AWS label -->
  <rect x="30" y="25" width="140" height="50" rx="8" fill="rgba(255,153,0,0.15)" stroke="rgba(255,153,0,0.4)" stroke-width="1"/>
  <text x="100" y="57" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#ff9900" text-anchor="middle" letter-spacing="2">AMAZON AWS</text>
  <!-- AWS text -->
  <text x="100" y="108" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">AWS</text>
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">Security Specialty</text>
  <!-- Bottom label -->
  <rect x="25" y="150" width="150" height="26" rx="6" fill="url(#accent)"/>
  <text x="100" y="167" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.5">CERTIFIED</text>
</svg>
