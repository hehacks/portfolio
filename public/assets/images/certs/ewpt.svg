<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077b6"/>
      <stop offset="100%" style="stop-color:#023e8a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg)" stroke="#0096c7" stroke-width="2"/>
  <rect x="10" y="10" width="180" height="180" rx="14" fill="none" stroke="rgba(0,150,199,0.3)" stroke-width="1"/>
  <!-- INE label -->
  <rect x="30" y="25" width="140" height="50" rx="8" fill="rgba(0,150,199,0.15)" stroke="rgba(0,150,199,0.4)" stroke-width="1"/>
  <text x="100" y="57" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#0096c7" text-anchor="middle" letter-spacing="2">INE SECURITY</text>
  <!-- eWPT text -->
  <text x="100" y="112" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">eWPT</text>
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">v3</text>
  <!-- Bottom label -->
  <rect x="25" y="148" width="150" height="28" rx="6" fill="url(#accent)"/>
  <text x="100" y="167" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.5">CERTIFIED</text>
</svg>
